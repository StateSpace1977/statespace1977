name: Process CSV Updates

on:
  push:
    paths:
      - 'csv_dropbox/**'

jobs:
  process-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml

      - name: Process Course Reviews
        run: python scripts/review.py

      - name: Process Placements
        run: python scripts/placement.py

      - name: Process Students
        run: python scripts/students.py

      - name: Commit & Push Generated Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ _tabs/
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generated pages from CSV update"
            git push
          else
            echo "No changes to commit."
          fi
